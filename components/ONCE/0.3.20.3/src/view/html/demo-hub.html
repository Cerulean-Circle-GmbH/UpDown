<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCE v0.3.20.3 Demo Hub - Live Server Management</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #1a1a1a; 
            color: #0f0; 
            margin: 0;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .demo-header { 
            border: 2px solid #0f0; 
            padding: 20px; 
            margin-bottom: 20px; 
            text-align: center;
            background: rgba(0, 255, 0, 0.1);
        }
        
        h1 { margin: 0 0 10px 0; }
        h2 { color: #ff0; margin-top: 30px; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #0f0;
            margin: 20px 0;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-value {
            font-size: 2em;
            font-weight: bold;
            color: #ff0;
        }
        
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .server-card {
            border: 2px solid #0f0;
            padding: 15px;
            background: rgba(0, 255, 0, 0.05);
            transition: all 0.3s;
        }
        
        .server-card.running {
            border-color: #0f0;
        }
        
        .server-card.stopped {
            border-color: #666;
            opacity: 0.5;
        }
        
        .server-card:hover {
            background: rgba(0, 255, 0, 0.15);
            border-color: #ff0;
        }
        
        .server-card h3 {
            margin: 0 0 10px 0;
            color: #ff0;
        }
        
        .server-status {
            font-size: 0.9em;
            margin: 5px 0;
        }
        
        .status-running { color: #0f0; }
        .status-stopped { color: #666; }
        
        .server-link, .action-btn {
            display: block;
            background: #666;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            text-align: center;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        .server-link:hover, .action-btn:hover {
            background: #888;
        }
        
        .action-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .open-all-btn, .start-next-btn, .end-gracefully-btn, .discover-btn {
            background: #666;
            color: #fff;
            border: 2px solid #666;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin: 10px;
        }
        
        .start-next-btn {
            background: #0a0;
            border-color: #0f0;
            color: #000;
        }
        
        .start-next-btn:hover:not(:disabled) {
            background: #0f0;
            border-color: #0f0;
        }
        
        .start-next-btn:disabled {
            background: #333;
            border-color: #666;
            color: #666;
            cursor: not-allowed;
        }
        
        .end-gracefully-btn {
            background: #a00;
            border-color: #f00;
        }
        
        .end-gracefully-btn:hover {
            background: #f00;
            border-color: #f00;
        }
        
        .discover-btn {
            background: #06a;
            border-color: #0af;
        }
        
        .discover-btn:hover {
            background: #0af;
            border-color: #0af;
        }
        
        .open-all-btn:hover {
            background: #888;
            border-color: #888;
        }
        
        .button-bar {
            text-align: center;
            margin: 20px 0;
        }
        
        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="demo-header">
        <h1>🎭 ONCE v0.3.20.3 Demo Hub</h1>
        <p>Live Server Management & Interactive Message Exchange</p>
    </div>
    
    <div class="status-bar">
        <div class="status-item">
            <div>Total Servers</div>
            <div class="status-value" id="totalServers">0</div>
        </div>
        <div class="status-item">
            <div>🟢 Running</div>
            <div class="status-value" id="runningServers">0</div>
        </div>
        <div class="status-item">
            <div>🔵 Clients</div>
            <div class="status-value" id="clientServers">0</div>
        </div>
        <div class="status-item">
            <div>⚪ Stopped</div>
            <div class="status-value" id="stoppedServers">0</div>
        </div>
    </div>
    
    <div class="button-bar">
        <button class="open-all-btn" onclick="openAllClients()">🚀 Open All Clients</button>
        <button class="start-next-btn" id="startNextBtn" onclick="startNextServer()" disabled>➕ Start Next Server</button>
        <button class="discover-btn" onclick="discoverServers()">🔍 Discover Servers</button>
        <button class="end-gracefully-btn" onclick="endGracefully()">🛑 End Gracefully</button>
    </div>
    
    <div class="last-updated" id="lastUpdated">Loading...</div>
    
    <h2>📡 Server Status:</h2>
    <div class="server-grid" id="serverGrid">
        <div style="text-align: center; color: #666;">Loading server status...</div>
    </div>
    
    <script>
        const primaryPort = 42777;
        let serverData = [];
        
        function createServerCard(server) {
            const isRunning = server.status === 'running';
            const statusClass = isRunning ? 'running' : 'stopped';
            const statusText = isRunning ? 'Running' : 'Stopped';
            const statusColor = isRunning ? 'status-running' : 'status-stopped';
            const isPrimary = server.port === primaryPort;
            const statusDot = isRunning ? '🟢' : '⚪';
            const serverType = isPrimary ? 'Primary Server' : `Client Server ${server.name.match(/\d+/)?.[0] || ''}`;
            
            return `
                <div class="server-card ${statusClass}">
                    <h3>${statusDot} ${serverType}</h3>
                    <p class="server-status">Port: ${server.port}</p>
                    <p class="server-status ${statusColor}">Status: ${statusText}</p>
                    ${server.uuid && server.uuid !== 'primary' ? `<p class="server-status" style="font-size: 0.8em;">UUID: ${server.uuid.substring(0, 8)}...</p>` : ''}
                    ${isRunning ? `
                        <a href="http://localhost:${server.port}/once" target="_blank" class="server-link">
                            🌐 Open Client
                        </a>
                        <button class="action-btn" onclick="openHealth(${server.port})">
                            💚 Health Check
                        </button>
                        ${!isPrimary ? `
                        <button class="action-btn" onclick="stopServer(${server.port}, '${server.uuid}')" style="background: #f00;">
                            🛑 Stop Server
                        </button>
                        ` : `
                        <button class="action-btn" onclick="discoverServers()" style="background: #06a;">
                            🔍 Discover Servers
                        </button>
                        <button class="action-btn" onclick="endGracefully()" style="background: #a00;">
                            🛑 End Gracefully
                        </button>
                        `}
                    ` : `
                        <button class="action-btn" disabled>
                            ⚪ Not Running
                        </button>
                    `}
                </div>
            `;
        }
        
        async function fetchServerStatus() {
            try {
                const response = await fetch(`http://localhost:${primaryPort}/servers`);
                const data = await response.json();
                
                // Add primary server
                const primary = {
                    name: 'Primary Server',
                    port: primaryPort,
                    status: 'running',
                    uuid: 'primary'
                };
                
                // Map registered clients
                const clients = data.servers.map((s, idx) => {
                    const port = s.capabilities.find(c => c.capability === 'httpPort')?.port;
                    return {
                        name: `Client Server ${idx + 1}`,
                        port: port,
                        status: 'running',
                        uuid: s.uuid
                    };
                });
                
                serverData = [primary, ...clients];
                
                // Update status bar
                document.getElementById('totalServers').textContent = serverData.length;
                document.getElementById('runningServers').textContent = serverData.length;
                document.getElementById('clientServers').textContent = clients.length;
                document.getElementById('stoppedServers').textContent = 0;
                
                // Update server grid
                const grid = document.getElementById('serverGrid');
                grid.innerHTML = serverData.map(s => createServerCard(s)).join('');
                
                // Enable/disable start next button based on server addition state
                const startBtn = document.getElementById('startNextBtn');
                startBtn.disabled = false; // Enable once we've confirmed servers are loaded
                
                // Update timestamp
                const now = new Date().toLocaleTimeString();
                document.getElementById('lastUpdated').textContent = `Last updated: ${now}`;
                
            } catch (error) {
                console.error('Failed to fetch server status:', error);
                document.getElementById('serverGrid').innerHTML = `
                    <div style="text-align: center; color: #f00;">
                        ❌ Primary server not running on port ${primaryPort}
                        <br><br>
                        Start demo: <code>./once demo 2</code>
                    </div>
                `;
            }
        }
        
        function openAllClients() {
            const runningServers = serverData.filter(s => s.status === 'running');
            runningServers.forEach(server => {
                window.open(`http://localhost:${server.port}/once`, '_blank');
            });
        }
        
        async function startNextServer() {
            const startBtn = document.getElementById('startNextBtn');
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Starting...';
            
            try {
                const response = await fetch(`http://localhost:${primaryPort}/start-server`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    console.log('✅ Server starting...');
                    // Wait for server to fully start before refreshing
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    await fetchServerStatus();
                    startBtn.textContent = '➕ Start Next Server';
                } else {
                    console.error('❌ Failed to start server');
                    startBtn.textContent = '❌ Failed';
                    setTimeout(() => {
                        startBtn.textContent = '➕ Start Next Server';
                        startBtn.disabled = false;
                    }, 2000);
                }
            } catch (error) {
                console.error('❌ Failed to start server:', error);
                startBtn.textContent = '❌ Failed';
                setTimeout(() => {
                    startBtn.textContent = '➕ Start Next Server';
                    startBtn.disabled = false;
                }, 2000);
            }
        }
        
        async function discoverServers() {
            try {
                console.log('🔍 Triggering server discovery and housekeeping...');
                const response = await fetch(`http://localhost:${primaryPort}/discover-servers`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('✅ Discovery complete:', result);
                    alert(`🔍 Discovery Complete\n\nDeleted: ${result.deleted || 0} stale scenarios\nDiscovered: ${result.discovered || 0} running servers`);
                    setTimeout(fetchServerStatus, 1000);
                } else {
                    console.error('❌ Discovery failed');
                    alert('❌ Discovery failed');
                }
            } catch (error) {
                console.error('❌ Failed to trigger discovery:', error);
                alert('❌ Failed to trigger discovery');
            }
        }
        
        async function endGracefully() {
            if (!confirm('Are you sure you want to gracefully shutdown ALL servers?\n\nThis will:\n- Stop the primary server\n- Stop all client servers\n- Update all scenarios to SHUTDOWN state')) {
                return;
            }
            
            try {
                console.log('🛑 Initiating graceful shutdown...');
                const response = await fetch(`http://localhost:${primaryPort}/shutdown-all`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    alert('✅ Graceful shutdown initiated\n\nAll servers will stop cleanly and update their scenarios.');
                    // Give it time to shutdown before trying to refresh
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                } else {
                    console.error('❌ Shutdown failed');
                    alert('❌ Shutdown failed');
                }
            } catch (error) {
                // Expected error if server shuts down before responding
                console.log('ℹ️  Server shutdown in progress (connection lost)');
                alert('✅ Graceful shutdown initiated\n\nServers are shutting down...');
                setTimeout(() => {
                    window.location.reload();
                }, 3000);
            }
        }
        
        async function stopServer(port, uuid) {
            try {
                const response = await fetch(`http://localhost:${primaryPort}/stop-server`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port, uuid })
                });
                
                if (response.ok) {
                    console.log(`✅ Server ${uuid} stopped`);
                    setTimeout(fetchServerStatus, 1000);
                } else {
                    console.error('❌ Failed to stop server');
                }
            } catch (error) {
                console.error('❌ Failed to stop server:', error);
            }
        }
        
        function openHealth(port) {
            window.open(`http://localhost:${port}/health`, '_blank');
        }
        
        // Initial load
        fetchServerStatus();
        
        // Auto-refresh every 3 seconds
        setInterval(fetchServerStatus, 3000);
    </script>
</body>
</html>
