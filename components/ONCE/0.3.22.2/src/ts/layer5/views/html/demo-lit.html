<!DOCTYPE html>
<!--
  @deprecated LEGACY HTML Template — Demo for Lit Web Components
  
  This is a transitional template. UcpView components should be loaded
  via the ONCE kernel's IOR-based component discovery instead.
  
  @pdca 2025-12-31-UTC-1900.unit-descriptor-sw-verification.pdca.md
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCE Demo Hub - Web4 MVC</title>
    
    <!-- Web4 Principle 19: External CSS Variables (global) 
         Web4 Principle 23: EAMD.ucp Virtual Root
         CB.2: Cache-busting @pdca 2026-01-02-UTC-1400.cache-busting-systematic-fix.pdca.md -->
    <link rel="stylesheet" href="/EAMD.ucp/components/ONCE/${this.version}/src/ts/layer5/views/css/themeBase.css?v=${this.buildTimestamp}">
    
    <!-- Import Map for Lit (Browser Module Resolution) -->
    <script type="importmap">
    {
        "imports": {
            "lit": "https://esm.run/lit@3.3.1",
            "lit/": "https://esm.run/lit@3.3.1/",
            "lit/decorators.js": "https://esm.run/lit@3.3.1/decorators.js",
            "@lit/reactive-element": "https://esm.run/@lit/reactive-element@2.0.0",
            "lit-html": "https://esm.run/lit-html@3.0.0"
        }
    }
    </script>
</head>
<body>
    <!-- 
        Web4 MVC Architecture:
        - OnceOverView is a Lit component that replaces demo-hub.html
        - CSS is preloaded via CSSLoader before component registration
        - HTML templates preloaded via HTMLTemplateLoader
        - Model updates via UcpController/ModelProxy (future: WebSocket scenarios)
        
        @pdca 2025-12-03-UTC-1400.lit-css-preload.pdca.md
    -->
    <div id="appContainer"></div>
    
    <script type="module">
        // ═══════════════════════════════════════════════════════════════
        // PHASE 1: Preload Assets BEFORE importing Lit components
        // Web4 Principle 23: EAMD.ucp Virtual Root for absolute imports
        // @pdca 2025-12-04-UTC-1400.self-orientation-asset-serving.pdca.md
        // ═══════════════════════════════════════════════════════════════
        
        // Import asset loaders via EAMD.ucp virtual root
        // CB.2: Cache-busting via ?v=buildTimestamp ensures fresh JS on server restart
        // @pdca 2026-01-02-UTC-1400.cache-busting-systematic-fix.pdca.md
        import { CSSLoader } from '/EAMD.ucp/components/ONCE/${this.version}/dist/ts/layer2/CSSLoader.js?v=${this.buildTimestamp}';
        import { HTMLTemplateLoader } from '/EAMD.ucp/components/ONCE/${this.version}/dist/ts/layer2/HTMLTemplateLoader.js?v=${this.buildTimestamp}';
        
        console.log('[demo-lit] 📦 Fetching asset manifest...');
        
        // Fetch asset manifest from server
        let manifest = { css: [], templates: [] };
        try {
            const response = await fetch('/asset-manifest');
            const data = await response.json();
            manifest = data.model || { css: [], templates: [] };
            console.log('[demo-lit] 📋 Asset manifest:', manifest);
        } catch (e) {
            console.warn('[demo-lit] ⚠️ Failed to fetch asset manifest, using defaults');
            // Fallback to known assets
            manifest = {
                css: [
                    '/dist/ts/layer5/views/css/ItemView.css',
                    '/dist/ts/layer5/views/css/OnceOverView.css'
                ],
                templates: [
                    '/dist/ts/layer5/views/webBeans/ItemView.html',
                    '/dist/ts/layer5/views/webBeans/OnceOverView.html'
                ]
            };
        }
        
        // Preload all assets in parallel
        console.log('[demo-lit] ⏳ Preloading assets...');
        await Promise.all([
            CSSLoader.preloadAll(manifest.css),
            HTMLTemplateLoader.preloadAll(manifest.templates)
        ]);
        console.log('[demo-lit] ✅ Assets preloaded');
        
        // ═══════════════════════════════════════════════════════════════
        // PHASE 2: Import Lit components (CSS is already cached)
        // ═══════════════════════════════════════════════════════════════
        
        console.log('[demo-lit] 📦 Importing Lit components...');
        
        // Import ONCE kernel via EAMD.ucp virtual root
        // CB.2: Cache-busting ensures fresh code on server restart
        const { ONCE } = await import('/EAMD.ucp/components/ONCE/${this.version}/dist/ts/layer1/ONCE.js?v=${this.buildTimestamp}');
        
        // Import Lit components (they self-register via @customElement)
        // CSS will be applied via adoptedStyleSheets in connectedCallback
        await import('/EAMD.ucp/components/ONCE/${this.version}/dist/ts/layer5/views/OnceOverView.js?v=${this.buildTimestamp}');
        await import('/EAMD.ucp/components/ONCE/${this.version}/dist/ts/layer5/views/DefaultItemView.js?v=${this.buildTimestamp}');
        await import('/EAMD.ucp/components/ONCE/${this.version}/dist/ts/layer5/views/OncePeerItemView.js');
        
        console.log('[demo-lit] ✅ Components imported');
        
        // ═══════════════════════════════════════════════════════════════
        // PHASE 3: Boot ONCE kernel and connect to view
        // ═══════════════════════════════════════════════════════════════
        
        // Get peer host from URL
        const urlParams = new URLSearchParams(window.location.search);
        const peerHost = urlParams.get('peer') || window.location.host;
        
        // Boot kernel
        const kernel = await ONCE.start({ peerHost });
        
        console.log('[demo-lit] ✅ ONCE Kernel booted:', kernel.model?.version);
        
        // ═══════════════════════════════════════════════════════════════
        // PHASE 4: Render app via orchestrator
        // ═══════════════════════════════════════════════════════════════
        
        // ✅ Web4 Architecture: Use appRender() which delegates to orchestrator
        // Orchestrator handles: view creation, event listeners, WebSocket, model sync
        // @pdca 2025-12-05-UTC-1500.spa-architecture-cleanup.pdca.md
        const appContainer = document.getElementById('appContainer');
        await kernel.appRender(appContainer);
        
        console.log('[demo-lit] ✅ ONCE Demo Hub (Lit) initialized via orchestrator');
    </script>
</body>
</html>
