<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCE Demo Hub - Web4 MVC</title>
    
    <!-- Web4 Principle 19: External CSS Variables (global) -->
    <link rel="stylesheet" href="../../dist/ts/layer5/views/css/themeBase.css">
    
    <!-- Import Map for Lit (Browser Module Resolution) -->
    <script type="importmap">
    {
        "imports": {
            "lit": "https://esm.run/lit@3.3.1",
            "lit/": "https://esm.run/lit@3.3.1/",
            "lit/decorators.js": "https://esm.run/lit@3.3.1/decorators.js",
            "@lit/reactive-element": "https://esm.run/@lit/reactive-element@2.0.0",
            "lit-html": "https://esm.run/lit-html@3.0.0"
        }
    }
    </script>
</head>
<body>
    <!-- 
        Web4 MVC Architecture:
        - OnceOverView is a Lit component that replaces demo-hub.html
        - CSS is preloaded via CSSLoader before component registration
        - HTML templates preloaded via HTMLTemplateLoader
        - Model updates via UcpController/ModelProxy (future: WebSocket scenarios)
        
        @pdca 2025-12-03-UTC-1400.lit-css-preload.pdca.md
    -->
    <div id="appContainer"></div>
    
    <script type="module">
        // ═══════════════════════════════════════════════════════════════
        // PHASE 1: Preload Assets BEFORE importing Lit components
        // ═══════════════════════════════════════════════════════════════
        
        // Import asset loaders
        import { CSSLoader } from '../../dist/ts/layer2/CSSLoader.js';
        import { HTMLTemplateLoader } from '../../dist/ts/layer2/HTMLTemplateLoader.js';
        
        console.log('[demo-lit] 📦 Fetching asset manifest...');
        
        // Fetch asset manifest from server
        let manifest = { css: [], templates: [] };
        try {
            const response = await fetch('/asset-manifest');
            const data = await response.json();
            manifest = data.model || { css: [], templates: [] };
            console.log('[demo-lit] 📋 Asset manifest:', manifest);
        } catch (e) {
            console.warn('[demo-lit] ⚠️ Failed to fetch asset manifest, using defaults');
            // Fallback to known assets
            manifest = {
                css: [
                    '/dist/ts/layer5/views/css/ItemView.css',
                    '/dist/ts/layer5/views/css/OnceOverView.css'
                ],
                templates: [
                    '/dist/ts/layer5/views/webBeans/ItemView.html',
                    '/dist/ts/layer5/views/webBeans/OnceOverView.html'
                ]
            };
        }
        
        // Preload all assets in parallel
        console.log('[demo-lit] ⏳ Preloading assets...');
        await Promise.all([
            CSSLoader.preloadAll(manifest.css),
            HTMLTemplateLoader.preloadAll(manifest.templates)
        ]);
        console.log('[demo-lit] ✅ Assets preloaded');
        
        // ═══════════════════════════════════════════════════════════════
        // PHASE 2: Import Lit components (CSS is already cached)
        // ═══════════════════════════════════════════════════════════════
        
        console.log('[demo-lit] 📦 Importing Lit components...');
        
        // Import ONCE kernel
        const { ONCE } = await import('../../dist/ts/layer1/ONCE.js');
        
        // Import Lit components (they self-register via @customElement)
        // CSS will be applied via adoptedStyleSheets in connectedCallback
        await import('../../dist/ts/layer5/views/OnceOverView.js');
        await import('../../dist/ts/layer5/views/ItemView.js');
        
        console.log('[demo-lit] ✅ Components imported');
        
        // ═══════════════════════════════════════════════════════════════
        // PHASE 3: Boot ONCE kernel and connect to view
        // ═══════════════════════════════════════════════════════════════
        
        // Get peer host from URL
        const urlParams = new URLSearchParams(window.location.search);
        const peerHost = urlParams.get('peer') || window.location.host;
        
        // Boot kernel
        const kernel = await ONCE.start({ peerHost });
        
        console.log('[demo-lit] ✅ ONCE Kernel booted:', kernel.model?.version);
        
        // Import the OnceOverView class for type checking
        const { OnceOverView } = await import('../../dist/ts/layer5/views/OnceOverView.js');
        
        // Create the view element dynamically AFTER component is registered
        console.log('[demo-lit] 📦 Creating OnceOverView element...');
        const mainView = document.createElement('once-over-view');
        document.getElementById('appContainer').appendChild(mainView);
        console.log('[demo-lit] ✅ OnceOverView element created');
        
        // Set model and kernel reference
        mainView.model = kernel.model;
        mainView.kernel = kernel;
        
        // ═══════════════════════════════════════════════════════════════
        // PHASE 4: WebSocket Scenario Updates (No Polling!)
        // ═══════════════════════════════════════════════════════════════
        
        // ✅ Register for model changes via WebSocket scenario updates
        // @pdca 2025-12-03-UTC-1930.websocket-scenario-broadcast.pdca.md
        function handleModelUpdate() {
            console.log('[demo-lit] 📡 Model update received via WebSocket');
            mainView.model = kernel.model;
            mainView.requestUpdate();
        }
        
        // ✅ Register listener with kernel (if available)
        if (typeof kernel.onModelChange === 'function') {
            kernel.onModelChange(handleModelUpdate);
            console.log('[demo-lit] ✅ Registered for WebSocket model updates');
        } else {
            console.warn('[demo-lit] ⚠️ kernel.onModelChange not available - using fallback polling');
            // Fallback to polling for older kernel versions
            setInterval(function() {
                mainView.model = kernel.model;
                mainView.requestUpdate();
            }, 2000);
        }
        
        console.log('[demo-lit] ✅ ONCE Demo Hub (Lit) initialized');
        
        // Debug: Check if custom element is registered
        const ceCheck = customElements.get('once-over-view');
        console.log('[demo-lit] Custom element registered:', ceCheck ? 'YES' : 'NO');
        console.log('[demo-lit] mainView element:', mainView);
        console.log('[demo-lit] mainView tagName:', mainView?.tagName);
        console.log('[demo-lit] mainView shadowRoot:', mainView?.shadowRoot);
    </script>
</body>
</html>
