<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCE Browser Kernel - P2P Demo</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #1a1a1a; 
            color: #0f0; 
            margin: 0;
            padding: 20px;
        }
        .demo-header { 
            border: 2px solid #0f0; 
            padding: 20px; 
            margin-bottom: 20px; 
            text-align: center;
            background: rgba(0, 255, 0, 0.1);
        }
        .connection-status {
            font-size: 1.2em;
            margin: 10px 0;
        }
        .message-log { 
            background: #000; 
            border: 1px solid #0f0; 
            padding: 15px; 
            height: 400px; 
            overflow-y: scroll; 
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
        }
        .acknowledgment { color: #ff0; font-weight: bold; }
        .connection { color: #0ff; }
        .message { color: #0f0; }
        .error { color: #f00; }
        .timestamp { color: #999; font-size: 0.9em; }
        
        .controls {
            margin: 20px 0;
            text-align: center;
        }
        
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        button:hover {
            background: #ff0;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        
        .stat-box {
            border: 1px solid #0f0;
            padding: 10px;
            background: rgba(0, 255, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="demo-header">
        <h1>🎭 ONCE P2P Network Demo</h1>
        <p>Web4 P2P Architecture - Radical OOP Kernel</p>
        <div class="connection-status" id="connectionStatus">🔴 Initializing...</div>
        <div class="connection-status" id="primaryConnection" style="font-size: 0.9em; color: #0ff;"></div>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <strong>Messages Sent:</strong> <span id="messagesSent">0</span>
        </div>
        <div class="stat-box">
            <strong>Messages Received:</strong> <span id="messagesReceived">0</span>
        </div>
        <div class="stat-box">
            <strong>Acknowledgments:</strong> <span id="acknowledgmentsSent">0</span>
        </div>
        <div class="stat-box">
            <strong>Connection Time:</strong> <span id="connectionTime">--:--:--</span>
        </div>
        <div class="stat-box" style="grid-column: 1 / -1;">
            <strong>Connected Peers:</strong> <span id="connectedServers">Initializing...</span>
        </div>
    </div>
    
    <div class="controls">
        <button id="broadcastBtn">📡 Broadcast to All</button>
        <button id="relayBtn">🔄 Relay via Primary</button>
        <button id="p2pBtn">🔗 P2P Direct</button>
        <button id="clearBtn">Clear Log</button>
    </div>
    
    <div class="message-log" id="messageLog">
        <div class="connection">📡 Initializing ONCE Browser Kernel...</div>
    </div>
    
    <script type="module">
        // ✅ Load ONCE Browser Kernel (Radical OOP module)
        import { BrowserONCEKernel } from '../js/once-browser-kernel.js';
        
        // ✅ Initialize kernel instance
        const kernel = new BrowserONCEKernel();
        
        // Get peer host from URL or use current location
        const urlParams = new URLSearchParams(window.location.search);
        const peerHost = urlParams.get('peer') || urlParams.get('server') || window.location.host;
        
        // Initialize with scenario
        await kernel.init({
            peerHost: peerHost
        });
        
        // ✅ Attach button handlers (method calls, not inline onclick)
        document.getElementById('broadcastBtn').addEventListener('click', () => {
            kernel.broadcastToAll();
        });
        
        document.getElementById('relayBtn').addEventListener('click', () => {
            kernel.relayViaPrimary();
        });
        
        document.getElementById('p2pBtn').addEventListener('click', () => {
            kernel.sendP2PDirect();
        });
        
        document.getElementById('clearBtn').addEventListener('click', () => {
            kernel.clearLog();
        });
        
        // Make kernel globally accessible for debugging
        window.onceKernel = kernel;
        
        console.log('✅ ONCE Browser Kernel initialized');
        console.log('   Peer:', peerHost);
        console.log('   Access via: window.onceKernel');
    </script>
</body>
</html>
