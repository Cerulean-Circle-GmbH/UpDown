<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Dynamic base path for GitHub Pages vs localhost -->
  <script>
    // Detect environment and set base path
    const isGitHubPages = window.location.hostname.includes('github.io');
    const basePath = isGitHubPages ? '/UpDown/' : '/';
    document.write('<base href="' + basePath + '">');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UpDown">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#667eea">
  <title>UpDown - Card Guessing Game</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1>🎴 UpDown</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Round</span>
          <span class="stat-value" id="round">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak</span>
          <span class="stat-value" id="streak">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Cards Left</span>
          <span class="stat-value" id="cards-left">52</span>
        </div>
      </div>
    </header>

    <main class="game-board">
      <!-- Previous card (if exists) -->
      <div class="previous-card-container">
        <div class="card-label">Previous</div>
        <div id="previous-card" class="card-slot empty"></div>
      </div>

      <!-- Current card -->
      <div class="current-card-container">
        <div class="card-label">Current Card</div>
        <div id="current-card" class="card-slot empty">
          <div class="card-back">?</div>
        </div>
      </div>

      <!-- Result message -->
      <div id="result-message" class="result-message"></div>

      <!-- Player choices -->
      <div class="choices" id="choices">
        <button class="choice-btn down-btn" id="btn-down">
          <span class="choice-icon">⬇</span>
          <span class="choice-label">Lower</span>
        </button>
        <button class="choice-btn equal-btn" id="btn-equal">
          <span class="choice-icon">=</span>
          <span class="choice-label">Equal</span>
        </button>
        <button class="choice-btn up-btn" id="btn-up">
          <span class="choice-icon">⬆</span>
          <span class="choice-label">Higher</span>
        </button>
      </div>

      <!-- Start/Restart button -->
      <div class="game-controls">
        <button class="start-btn" id="start-btn">Start Game</button>
        <div class="keyboard-shortcuts">
          <small>Keyboard: <kbd>U</kbd> = Start • <kbd>D</kbd> = Stop</small>
        </div>
      </div>

      <!-- Game Over screen -->
      <div id="game-over" class="game-over hidden">
        <div class="game-over-content">
          <h2>Game Over!</h2>
          <div class="final-stats">
            <p>Final Score: <strong id="final-score">0</strong></p>
            <p>Rounds Survived: <strong id="final-rounds">0</strong></p>
            <p>Best Streak: <strong id="final-streak">0</strong></p>
          </div>
          <button class="restart-btn" id="restart-btn">Play Again</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
