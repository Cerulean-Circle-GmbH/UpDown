# Deploy UpDown game to GitHub Pages with Jekyll
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "dev/qnd2"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build and deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qnd/package.json
      
      - name: Install dependencies
        working-directory: ./qnd
        run: npm install
      
      - name: Build TypeScript with esbuild
        working-directory: ./qnd
        run: npm run build
      
      - name: Copy game files to root for Jekyll
        run: |
          # Copy game files to root directory
          cp -r qnd/src/public/* .
          # Create index.html in js/ directory for /js route
          cp index-js.html js/index.html
          # Create index.html in ts/ directory for /ts route  
          cp index-ts.html ts/index.html
          # Verify structure
          echo "Root index.html:"
          ls -la index.html
          echo "JS directory:"
          ls -la js/index.html
          echo "TS directory:"
          ls -la ts/index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
